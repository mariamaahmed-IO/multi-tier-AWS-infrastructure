name: Terraform PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "utc-infrastructure/**.tf"
      -  "utc-infrastructure/environments/dev/**.tfvars"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: us-east-1

jobs:
  terraform-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./utc-infrastructure

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init -input=false

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        continue-on-error: true
        env:
          TF_VAR_env: ${{ secrets.TF_VAR_env }}
          TF_VAR_my_ip: ${{ secrets.TF_VAR_my_ip }}
          TF_VAR_ami_id: ${{ secrets.TF_VAR_ami_id }}
          TF_VAR_asg_ami_id: ${{ secrets.TF_VAR_asg_ami_id }}
          TF_VAR_db_username: ${{ secrets.TF_VAR_db_username }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_email: ${{ secrets.TF_VAR_email }}
        run: terraform plan -no-color -input=false 2>&1 | tee plan_output.txt
        
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('utc-infrastructure/plan_output.txt', 'utf8').slice(0, 60000);

            const fmtIcon  = '${{ steps.fmt.outcome }}'      === 'success' ? '✅' : '⚠️';
            const initIcon = '${{ steps.init.outcome }}'     === 'success' ? '✅' : '❌';
            const valIcon  = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planIcon = '${{ steps.plan.outcome }}'     === 'success' ? '✅' : '❌';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Terraform Plan Result

              | Step | Status |
              |------|--------|
              | Format   | ${fmtIcon} |
              | Init     | ${initIcon} |
              | Validate | ${valIcon} |
              | Plan     | ${planIcon} |

              <details><summary>📋 Plan output</summary>

              \`\`\`hcl
              ${plan}
              \`\`\`
              </details>

              > Review the plan above before approving this PR.`
            });